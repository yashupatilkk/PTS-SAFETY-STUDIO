<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEP & Safety Vault — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--amber:#ffb020;--amber-dark:#e0961a;--red:#e8483a;--green:#3ecf8e;--orange:#f0883e;--radius:14px;--radius-sm:8px;--sidebar-w:252px;--stripe:repeating-linear-gradient(45deg,#151515 0 14px,var(--amber) 14px 28px);}
html[data-theme="dark"]{--bg:#0d1117;--surface:#161b22;--surface-2:#1c2333;--surface-3:#22293a;--text:#e6edf3;--muted:#7d8590;--border:#2d333b;--shadow:0 8px 32px rgba(0,0,0,.5);--hover:0 0 0 1px var(--amber),0 8px 30px rgba(255,176,32,.08);}
html[data-theme="light"]{--bg:#f0f2f5;--surface:#ffffff;--surface-2:#f6f8fa;--surface-3:#eaeef2;--text:#1f2328;--muted:#656d76;--border:#d0d7de;--shadow:0 8px 32px rgba(20,20,10,.08);--hover:0 0 0 1px var(--amber),0 8px 30px rgba(255,176,32,.12);}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;transition:background .3s,color .3s;overflow:hidden;}
h1,h2,h3,h4,.disp{font-family:'Oswald',sans-serif;letter-spacing:.02em;}
.mono{font-family:'JetBrains Mono',monospace;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
::selection{background:var(--amber);color:#151515;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

.bg-layer{position:fixed;inset:0;pointer-events:none;z-index:0;}
.bg-dots{background-image:radial-gradient(circle at 1px 1px,var(--border) .5px,transparent 0);background-size:28px 28px;opacity:.3;}
.bg-glow{background:radial-gradient(ellipse at 15% 30%,rgba(255,176,32,.04) 0%,transparent 50%),radial-gradient(ellipse at 85% 70%,rgba(62,207,142,.03) 0%,transparent 50%);animation:bgF 25s ease-in-out infinite alternate;}
@keyframes bgF{to{transform:scale(1.08) translate(-3%,4%);}}

.gradient-bar{height:3px;background:linear-gradient(90deg,var(--amber),var(--red),var(--amber),var(--green),var(--amber));background-size:300% 100%;animation:grS 4s linear infinite;position:relative;z-index:70;}
@keyframes grS{to{background-position:300% 50%;}}

/* Sidebar */
.sidebar{position:fixed;top:3px;left:0;bottom:0;width:var(--sidebar-w);z-index:60;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:transform .3s ease;}
.sidebar-head{padding:16px 14px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.brand-mark{width:38px;height:38px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;background:var(--stripe);background-size:22px 22px;font-size:16px;animation:strA 3s linear infinite;box-shadow:var(--shadow);}
@keyframes strA{to{background-position:22px 22px;}}
.brand-text h1{font-size:15px;text-transform:uppercase;font-weight:700;line-height:1.15;}
.brand-text span{font-size:9.5px;color:var(--muted);font-weight:600;letter-spacing:.08em;text-transform:uppercase;}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px 7px;}
.nav-section{margin-top:12px;}
.nav-section-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:0 9px 6px;opacity:.55;}
.nav-item{width:100%;display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:var(--radius-sm);font-size:12.5px;font-weight:500;transition:all .15s;position:relative;text-align:left;}
.nav-item:hover{background:var(--surface-2);}
.nav-item.active{background:rgba(255,176,32,.1);color:var(--amber);}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:16px;border-radius:0 3px 3px 0;background:var(--amber);}
.nav-ico{font-size:14px;width:18px;text-align:center;flex:none;}
.nav-badge{margin-left:auto;font-size:9.5px;font-weight:700;background:var(--surface-3);padding:2px 6px;border-radius:99px;color:var(--muted);min-width:20px;text-align:center;}
.nav-item.active .nav-badge{background:rgba(255,176,32,.15);color:var(--amber);}
.cat-dot-sm{width:7px;height:7px;border-radius:50%;flex:none;}
.nav-alert{width:6px;height:6px;border-radius:50%;background:var(--red);flex:none;margin-left:3px;animation:pls 2s ease infinite;}
@keyframes pls{0%,100%{opacity:1;}50%{opacity:.4;}}

.sidebar-foot{padding:10px 14px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
.role-toggle{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:600;color:var(--muted);}
.role-switch{position:relative;width:42px;height:22px;border-radius:11px;background:var(--surface-3);border:1px solid var(--border);cursor:pointer;transition:all .2s;flex:none;}
.role-switch .knob{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--muted);transition:all .2s;}
.role-switch.admin{background:rgba(255,176,32,.2);border-color:var(--amber);}
.role-switch.admin .knob{left:22px;background:var(--amber);}
.role-label{min-width:40px;}
.foot-row{display:flex;align-items:center;justify-content:space-between;}
.theme-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;flex:none;}
.theme-btn:hover{transform:rotate(20deg);background:var(--amber);color:#151515;border-color:var(--amber);}
.ver{font-size:9.5px;color:var(--muted);font-weight:600;}
.sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:55;backdrop-filter:blur(2px);}
.sidebar-backdrop.show{display:block;}

/* Main */
.main-area{margin-left:var(--sidebar-w);height:calc(100vh - 3px);display:flex;flex-direction:column;position:relative;z-index:1;}
.topbar{height:54px;flex:none;display:flex;align-items:center;gap:12px;padding:0 20px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:40;backdrop-filter:blur(8px);}
.menu-toggle{display:none;width:32px;height:32px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface-2);font-size:16px;align-items:center;justify-content:center;flex:none;}
.page-title{font-family:'Oswald',sans-serif;font-size:17px;font-weight:600;text-transform:uppercase;flex:none;}
.topbar-spacer{flex:1;}
.role-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:4px 10px;border-radius:99px;flex:none;}
.role-badge.admin{background:rgba(255,176,32,.12);color:var(--amber);}
.role-badge.employee{background:rgba(62,207,142,.12);color:var(--green);}
.room-filter-tag{display:none;align-items:center;gap:5px;padding:4px 10px;border-radius:99px;background:rgba(255,176,32,.1);color:var(--amber);font-size:11px;font-weight:600;}
.room-filter-tag.show{display:flex;}
.room-filter-tag button{font-size:13px;line-height:1;opacity:.7;transition:opacity .15s;}
.room-filter-tag button:hover{opacity:1;}
.search-wrap{position:relative;}
.search-wrap input{width:240px;max-width:40vw;padding:7px 12px 7px 32px;border-radius:99px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);font-size:12.5px;outline:none;transition:border .2s;}
.search-wrap input:focus{border-color:var(--amber);}
.search-wrap .ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;}
.content{flex:1;overflow-y:auto;padding:20px;scroll-behavior:smooth;}
.view{display:none;animation:fadeUp .4s ease forwards;}
.view.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

/* Dashboard */
.dash-greeting{margin-bottom:20px;}
.dash-greeting h2{font-size:22px;font-weight:700;text-transform:uppercase;margin-bottom:2px;}
.dash-greeting p{color:var(--muted);font-size:12.5px;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden;transition:transform .2s,box-shadow .2s;}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
.stat-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}
.stat-card.s1::before{background:var(--amber);}.stat-card.s2::before{background:var(--orange);}.stat-card.s3::before{background:var(--green);}.stat-card.s4::before{background:var(--red);}
.stat-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;margin-bottom:10px;}
.s1 .stat-icon{background:rgba(255,176,32,.1);}.s2 .stat-icon{background:rgba(240,136,62,.1);}.s3 .stat-icon{background:rgba(62,207,142,.1);}.s4 .stat-icon{background:rgba(232,72,58,.1);}
.stat-num{font-family:'Oswald',sans-serif;font-size:30px;font-weight:700;line-height:1;margin-bottom:2px;}
.stat-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.stat-sub{font-size:10.5px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:4px;}
.stat-sub .up{color:var(--green);}.stat-sub .dn{color:var(--red);}
.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;}
.quick-btn{padding:14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;gap:6px;transition:all .2s;position:relative;overflow:hidden;text-align:left;}
.quick-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:0 4px 4px 0;}
.quick-btn:nth-child(1)::before{background:var(--amber);}.quick-btn:nth-child(2)::before{background:var(--green);}.quick-btn:nth-child(3)::before{background:var(--orange);}.quick-btn:nth-child(4)::before{background:#c084fc;}
.quick-btn:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--amber);}
.quick-btn:active{transform:translateY(0) scale(.97);}
.quick-btn-ico{font-size:20px;width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;}
.quick-btn:nth-child(1) .quick-btn-ico{background:rgba(255,176,32,.1);}.quick-btn:nth-child(2) .quick-btn-ico{background:rgba(62,207,142,.1);}.quick-btn:nth-child(3) .quick-btn-ico{background:rgba(240,136,62,.1);}.quick-btn:nth-child(4) .quick-btn-ico{background:rgba(192,132,252,.1);}
.quick-btn-title{font-size:12px;font-weight:700;text-transform:uppercase;}
.quick-btn-desc{font-size:10.5px;color:var(--muted);line-height:1.35;}
.dash-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;overflow:hidden;}
.dash-card-title{font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.dash-card-title .dot{width:7px;height:7px;border-radius:50%;background:var(--amber);}
.chart-area{display:flex;align-items:center;gap:18px;}
.chart-canvas-wrap{flex:none;width:150px;height:150px;position:relative;}
.chart-canvas-wrap canvas{width:100%;height:100%;}
.chart-legend{flex:1;display:flex;flex-direction:column;gap:5px;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11.5px;}
.legend-dot{width:8px;height:8px;border-radius:3px;flex:none;}
.legend-name{flex:1;color:var(--muted);}
.legend-val{font-weight:700;font-family:'Oswald',sans-serif;font-size:12px;}
.cat-quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cat-quick{padding:9px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface-2);cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:3px;}
.cat-quick:hover{border-color:var(--amber);background:rgba(255,176,32,.04);transform:translateY(-1px);}
.cat-quick-top{display:flex;align-items:center;justify-content:space-between;}
.cat-quick-name{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;margin-right:5px;}
.cat-quick-count{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;}
.cat-quick-bar{height:3px;border-radius:2px;background:var(--surface-3);overflow:hidden;}
.cat-quick-fill{height:100%;border-radius:2px;transition:width .8s ease;}
.due-list{display:flex;flex-direction:column;gap:6px;}
.due-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface-2);cursor:pointer;transition:all .15s;}
.due-item:hover{border-color:var(--amber);background:rgba(255,176,32,.03);}
.due-ico{font-size:16px;flex:none;}
.due-info{flex:1;min-width:0;}
.due-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.due-cat{font-size:10px;color:var(--muted);}
.status-badge{flex:none;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;padding:2px 6px;border-radius:99px;white-space:nowrap;}
.status-badge.active{background:rgba(62,207,142,.12);color:var(--green);}
.status-badge.warning{background:rgba(240,136,62,.12);color:var(--orange);animation:pls 2s ease infinite;}
.status-badge.danger{background:rgba(232,72,58,.12);color:var(--red);animation:pls 1.5s ease infinite;}
.tips-list{display:flex;flex-direction:column;gap:8px;}
.tip-item{display:flex;gap:8px;font-size:12px;line-height:1.45;color:var(--muted);}
.tip-num{flex:none;width:20px;height:20px;border-radius:50%;background:rgba(255,176,32,.1);color:var(--amber);font-size:9.5px;font-weight:700;display:flex;align-items:center;justify-content:center;}

/* Rooms */
.rooms-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
.room-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .25s;opacity:0;animation:fadeUp .45s ease forwards;position:relative;}
.room-card:hover{box-shadow:0 0 0 1px var(--rc,var(--amber)),0 8px 30px rgba(0,0,0,.2);transform:translateY(-3px);}
.room-card-head{padding:16px 16px 12px;display:flex;gap:12px;align-items:flex-start;}
.room-ico{width:44px;height:44px;border-radius:11px;flex:none;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;background:linear-gradient(135deg,var(--rc,#ffb020),#151515);}
.room-card-head h3{font-size:15px;text-transform:uppercase;font-weight:600;line-height:1.2;}
.room-card-head p{font-size:11px;color:var(--muted);line-height:1.35;margin-top:2px;}
.room-count-badge{margin-left:auto;font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;color:var(--rc,var(--amber));flex:none;}
.room-add-btn{position:absolute;top:12px;right:12px;width:30px;height:30px;border-radius:8px;background:rgba(255,176,32,.15);color:var(--amber);font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .15s;z-index:3;border:1px solid rgba(255,176,32,.2);}
.room-add-btn:hover{background:var(--amber);color:#151515;transform:scale(1.1);}
.room-icons{padding:0 16px;display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;min-height:40px;align-items:center;}
.room-icon-tile{width:34px;height:34px;border-radius:7px;background:var(--surface-2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s;cursor:pointer;position:relative;}
.room-icon-tile:hover{border-color:var(--amber);transform:scale(1.1);}
.room-icon-tile .remove-x{display:none;position:absolute;top:-4px;right:-4px;width:14px;height:14px;border-radius:50%;background:var(--red);color:#fff;font-size:8px;font-weight:700;align-items:center;justify-content:center;border:1px solid var(--surface);}
.room-icon-tile:hover .remove-x{display:flex;}
.room-empty-msg{font-size:10.5px;color:var(--muted);font-style:italic;}
.room-more{width:34px;height:34px;border-radius:7px;background:var(--surface-3);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:var(--muted);}
.room-status-bar{margin:0 16px;height:4px;border-radius:2px;background:var(--surface-3);overflow:hidden;display:flex;}
.room-status-bar>div{height:100%;transition:width .8s ease;}
.room-foot{padding:10px 16px 14px;display:flex;align-items:center;justify-content:space-between;}
.room-status-text{font-size:10.5px;color:var(--muted);display:flex;gap:7px;flex-wrap:wrap;}
.room-status-text span{display:flex;align-items:center;gap:3px;}
.room-status-text .sd{width:5px;height:5px;border-radius:50%;}
.btn-sm{padding:6px 12px;border-radius:99px;border:1px solid var(--amber);background:transparent;color:var(--amber);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;transition:all .15s;display:flex;align-items:center;gap:3px;}
.btn-sm:hover{background:var(--amber);color:#151515;}

/* Equipment grid */
.chips-wrap{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none;}
.chips-wrap::-webkit-scrollbar{display:none;}
.chip{flex:none;padding:5px 11px;border-radius:99px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;white-space:nowrap;transition:all .2s;}
.chip:hover{border-color:var(--amber);color:var(--text);}
.chip.active{background:var(--amber);color:#151515;border-color:var(--amber);}
.eq-stats{color:var(--muted);font-size:12px;margin-bottom:10px;}
.eq-stats b{color:var(--text);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;opacity:0;transform:translateY(10px);animation:cIn .4s ease forwards;transition:transform .2s,box-shadow .2s,border-color .2s;}
.card:hover{transform:translateY(-3px);box-shadow:var(--hover);}
@keyframes cIn{to{opacity:1;transform:translateY(0);}}
.thumb{height:100px;position:relative;display:flex;align-items:center;justify-content:center;font-size:34px;color:#fff;}
.thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,0) 40%,rgba(0,0,0,.35) 100%);}
.thumb .tag{position:absolute;top:6px;left:6px;z-index:2;font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;background:rgba(0,0,0,.5);color:#fff;padding:2px 6px;border-radius:99px;backdrop-filter:blur(3px);}
.thumb .status-tag{position:absolute;top:6px;right:6px;z-index:2;font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;padding:2px 6px;border-radius:99px;backdrop-filter:blur(3px);}
.thumb .ico{position:relative;z-index:1;}
.card-body{padding:11px 11px 10px;display:flex;flex-direction:column;gap:4px;flex:1;}
.card-body h3{font-size:14px;text-transform:uppercase;font-weight:600;}
.cat-line{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;font-weight:600;}
.cat-dot{width:5px;height:5px;border-radius:50%;flex:none;}
.desc{font-size:11.5px;color:var(--muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.spec-line{font-size:10px;color:var(--text);background:var(--surface-2);border:1px solid var(--border);border-radius:5px;padding:4px 6px;line-height:1.3;}
.card-actions{display:flex;gap:5px;margin-top:auto;padding-top:3px;}
.btn{flex:1;padding:7px 6px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;display:flex;align-items:center;justify-content:center;gap:3px;transition:all .15s;}
.btn:active{transform:scale(.96);}
.btn-primary{background:var(--amber);border-color:var(--amber);color:#151515;}
.btn-primary:hover{background:var(--amber-dark);}
.btn-yt{border-color:var(--red);color:var(--red);}
.btn-yt:hover{background:var(--red);color:#fff;}
.empty{grid-column:1/-1;text-align:center;padding:40px 20px;color:var(--muted);}
.empty .e-ico{font-size:30px;display:block;margin-bottom:5px;}

/* Picker overlay */
.picker-overlay{position:fixed;inset:0;background:rgba(5,6,8,.75);backdrop-filter:blur(6px);z-index:110;display:flex;align-items:stretch;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .25s;}
.picker-overlay.open{opacity:1;pointer-events:auto;}
.picker-panel{width:520px;max-width:95vw;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .3s ease;overflow:hidden;}
.picker-overlay.open .picker-panel{transform:translateX(0);}
.picker-head{padding:18px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.picker-head h3{font-size:17px;text-transform:uppercase;flex:1;}
.picker-close{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;flex:none;}
.picker-close:hover{background:var(--red);color:#fff;border-color:var(--red);}
.picker-search{padding:10px 18px;border-bottom:1px solid var(--border);flex-shrink:0;}
.picker-search input{width:100%;padding:8px 12px 8px 32px;border-radius:99px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);font-size:12.5px;outline:none;transition:border .2s;position:relative;}
.picker-search input:focus{border-color:var(--amber);}
.picker-search{position:relative;}
.picker-search .ic{position:absolute;left:30px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;z-index:1;}
.picker-chips{padding:8px 18px 0;display:flex;gap:5px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.picker-chips::-webkit-scrollbar{display:none;}
.picker-count{padding:8px 18px;font-size:11px;color:var(--muted);font-weight:600;flex-shrink:0;}
.picker-count b{color:var(--text);}
.picker-list{flex:1;overflow-y:auto;padding:6px 18px 18px;display:flex;flex-direction:column;gap:6px;}
.picker-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface-2);transition:all .15s;cursor:pointer;}
.picker-item:hover{border-color:var(--amber);background:rgba(255,176,32,.04);}
.picker-item.added{border-color:var(--green);background:rgba(62,207,142,.06);}
.picker-item-ico{font-size:22px;flex:none;width:32px;text-align:center;}
.picker-item-info{flex:1;min-width:0;}
.picker-item-name{font-size:13px;font-weight:600;}
.picker-item-cat{font-size:10px;color:var(--muted);}
.picker-item-btn{padding:6px 14px;border-radius:99px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;transition:all .15s;flex:none;white-space:nowrap;}
.picker-item-btn.add{background:var(--amber);color:#151515;border:1px solid var(--amber);}
.picker-item-btn.add:hover{background:var(--amber-dark);}
.picker-item-btn.remove{background:transparent;color:var(--red);border:1px solid var(--red);}
.picker-item-btn.remove:hover{background:var(--red);color:#fff;}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(5,6,8,.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;opacity:0;pointer-events:none;transition:opacity .25s;overflow-y:auto;}
.overlay.open{opacity:1;pointer-events:auto;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:680px;transform:translateY(30px) scale(.97);transition:transform .3s;box-shadow:var(--shadow);margin:auto 0;}
.overlay.open .modal{transform:translateY(0) scale(1);}
.modal-top{height:5px;background:var(--stripe);background-size:28px 28px;border-radius:16px 16px 0 0;}
.modal-head{padding:16px 18px 10px;display:flex;gap:12px;align-items:flex-start;border-bottom:1px solid var(--border);}
.modal-ico{width:46px;height:46px;border-radius:11px;flex:none;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;}
.modal-head h2{font-size:19px;text-transform:uppercase;}
.modal-head .cat-line{margin-top:2px;}
.close-btn{margin-left:auto;width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--surface-2);font-size:13px;flex:none;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.close-btn:hover{background:var(--red);color:#fff;border-color:var(--red);}
.modal-body{padding:6px 18px 18px;display:flex;flex-direction:column;gap:12px;}
.sec-label{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--amber);margin-bottom:3px;}
.sec-text{font-size:12.5px;line-height:1.5;}
.spec-box{font-size:11.5px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:7px 9px;line-height:1.5;}
.ul-list{list-style:none;display:flex;flex-direction:column;gap:4px;}
.ul-list li{font-size:12px;line-height:1.4;display:flex;gap:5px;align-items:flex-start;}
.ul-list li::before{content:'✓';color:var(--green);font-weight:700;flex:none;margin-top:1px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-foot{padding:6px 18px 18px;display:flex;gap:8px;}
.modal-foot .btn{flex:none;padding:9px 16px;}

/* Toast */
.toast-box{position:fixed;top:60px;right:16px;z-index:200;display:flex;flex-direction:column;gap:6px;pointer-events:none;}
.toast{padding:10px 16px;border-radius:10px;background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow);font-size:12px;font-weight:500;display:flex;align-items:center;gap:7px;animation:tIn .3s ease;pointer-events:auto;max-width:300px;}
.toast.out{animation:tOut .3s ease forwards;}
@keyframes tIn{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:translateX(0);}}
@keyframes tOut{to{opacity:0;transform:translateX(40px);}}

.to-top{position:fixed;right:16px;bottom:16px;width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:15px;font-weight:700;box-shadow:var(--shadow);opacity:0;pointer-events:none;transform:translateY(10px);transition:all .25s;z-index:50;}
.to-top.show{opacity:1;pointer-events:auto;transform:translateY(0);}
.to-top:hover{background:var(--amber);color:#151515;border-color:var(--amber);}

@media(max-width:1100px){.stat-grid{grid-template-columns:repeat(2,1fr);}.quick-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:768px){.sidebar{transform:translateX(-100%);}.sidebar.open{transform:translateX(0);}.sidebar-backdrop.show{display:block;}.main-area{margin-left:0;}.menu-toggle{display:flex;}.search-wrap input{width:150px;}.dash-row{grid-template-columns:1fr;}.rooms-grid{grid-template-columns:1fr;}.two-col{grid-template-columns:1fr;}.modal-head{flex-wrap:wrap;}.content{padding:14px;}.picker-panel{width:100%;max-width:100%;}}
@media(max-width:480px){.stat-grid{grid-template-columns:1fr 1fr;gap:8px;}.quick-grid{grid-template-columns:1fr;}.chart-area{flex-direction:column;align-items:center;}.search-wrap input{width:110px;}.room-card-head{flex-wrap:wrap;}.room-count-badge{margin-left:0;margin-top:4px;}}
</style>
</head>

/* Build equipment objects */
function getStatus(idx){const v=(idx*7+3)%10;if(v<7)return{label:"Active",cls:"active"};if(v<9)return{label:"Due Service",cls:"warning"};return{label:"Overdue",cls:"danger"};}
const EQUIP=DATA.map((d,idx)=>{const t=CATS[d.c];return{id:idx,name:d.n,cat:d.c,icon:d.i,spec:d.s,color:t.color,status:getStatus(idx),desc:t.desc.replaceAll("{n}",d.n),purpose:t.purpose,working:t.working,apps:t.apps,check:t.check,maint:t.maint,safe:t.safe,yt:"https://www.youtube.com/results?search_query="+encodeURIComponent(d.n+" training maintenance safety")};});

/* Dynamic room assignments: roomName -> Set of equip IDs */
let roomAssignments={};
function initRoomAssignments(){
  roomAssignments={};
  ROOMS.forEach(r=>{roomAssignments[r.name]=new Set();});
  EQUIP.forEach(e=>{
    for(const r of ROOMS){
      if(r.match.includes(e.name)){roomAssignments[r.name].add(e.id);break;}
    }
  });
}
initRoomAssignments();

/* Get which room(s) an equipment belongs to */
function getRoomsForEquip(eid){
  const rooms=[];
  for(const rn in roomAssignments){if(roomAssignments[rn].has(eid))rooms.push(rn);}
  return rooms;
}

function toggleEquipInRoom(eid){
  const assigned=roomAssignments[pickerRoom];

  }else{
    assigned.add(eid);
    toast(`Added ${e.name} to ${pickerRoom}`,"➕");
  }
  renderPicker();
}

function drawDonut(data){
  const canvas=document.getElementById("donutChart");if(!canvas)return;
  const ctx=canvas.getContext("2d"),dpr=window.devicePixelRatio||1,rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;ctx.scale(dpr,dpr);
  const cx=rect.width/2,cy=rect.height/2,oR=Math.max(1,Math.min(cx,cy)-5),iR=Math.max(1,oR*.56),gap=.03,total=data.reduce((s,d)=>s+d.value,0);
  if(!total)return;let prog=0;
  const cs=getComputedStyle(document.documentElement),tc=cs.getPropertyValue("--text").trim(),mc=cs.getPropertyValue("--muted").trim();
  (function frame(){
    prog=Math.min(1,prog+.025);ctx.clearRect(0,0,rect.width,rect.height);
    let a=-Math.PI/2;
    data.forEach(d=>{const sw=(d.value/total)*Math.PI*2*prog-gap;if(sw>.001){ctx.beginPath();ctx.arc(cx,cy,oR,a,a+sw);ctx.arc(cx,cy,iR,a+sw,a,true);ctx.closePath();ctx.fillStyle=d.color;ctx.fill();}a+=(d.value/total)*Math.PI*2*prog;});
    ctx.fillStyle=tc;ctx.font="700 26px Oswald";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(Math.round(total*prog),cx,cy-6);
    ctx.font="500 8px Inter";ctx.fillStyle=mc;ctx.fillText("TOTAL ITEMS",cx,cy+11);
    if(prog<1)requestAnimationFrame(frame);
  })();
}

  roomAssignments[roomName].delete(eid);
  toast(`Removed ${e.name} from ${roomName}`,"➖");
  renderRooms();
  initSidebar();
}

/* ====== EQUIPMENT VIEW ====== */
function renderEquipment(){
  const q=currentSearch.toLowerCase();
  const filtered=EQUIP.filter(e=>{
    const mc=currentCat==="All"||e.cat===currentCat;
    const mr=!currentRoom||getRoomsForEquip(e.id).includes(currentRoom);
    const ms=!q||e.name.toLowerCase().includes(q)||e.cat.toLowerCase().includes(q)||e.spec.toLowerCase().includes(q);
    return mc&&mr&&ms;
  });
  const cats=["All",...Object.keys(CATS)];
  let chipsHtml=cats.map(c=>{const cnt=c==="All"?EQUIP.length:EQUIP.filter(e=>e.cat===c).length;return`<button class="chip${currentCat===c?" active":""}" onclick="setCat('${c.replace(/'/g,"\\'")}')">${c} (${cnt})</button>`;}).join("");
  let gridHtml;
  if(!filtered.length)gridHtml=`<div class="empty"><span class="e-ico">🗂️</span>No equipment found.</div>`;
  else gridHtml=filtered.map((e,i)=>{const rooms=getRoomsForEquip(e.id);return`<div class="card" style="animation-delay:${Math.min(i*20,400)}ms"><div class="thumb" style="background:linear-gradient(135deg,${e.color},#151515)"><span class="tag">${rooms[0]||e.cat}</span><span class="status-tag status-badge ${e.status.cls}">${e.status.label}</span><span class="ico">${e.icon}</span></div><div class="card-body"><h3>${e.name}</h3><div class="cat-line"><span class="cat-dot" style="background:${e.color}"></span>${e.cat}${rooms.length>1?` · +${rooms.length-1} rooms`:''}</div><p class="desc">${e.desc}</p><div class="spec-line mono">${e.spec}</div><div class="card-actions"><button class="btn btn-primary" onclick="openModal(${e.id})">ℹ️ Details</button><a class="btn btn-yt" href="${e.yt}" target="_blank" rel="noopener">▶ Video</a></div></div></div>`;}).join("");
  document.getElementById("equipmentView").innerHTML=`<div class="chips-wrap">${chipsHtml}</div><div class="eq-stats">Showing <b>${filtered.length}</b> of <b>${EQUIP.length}</b> equipment</div><div class="grid">${gridHtml}</div>`;
}
function setCat(c){currentCat=c;renderEquipment();}

/* ====== MODAL ====== */
function ul(items){return`<ul class="ul-list">${items.map(x=>`<li>${x}</li>`).join("")}</ul>`;}
function openModal(id){
  const e=EQUIP.find(x=>x.id===id);if(!e)return;
  const rooms=getRoomsForEquip(e.id);
  document.getElementById("modal").innerHTML=`<div class="modal-top"></div><div class="modal-head"><div class="modal-ico" style="background:linear-gradient(135deg,${e.color},#151515)">${e.icon}</div><div><h2>${e.name}</h2><div class="cat-line"><span class="cat-dot" style="background:${e.color}"></span>${e.cat} · ${rooms.join(', ')||'Unassigned'} <span class="status-badge ${e.status.cls}" style="margin-left:5px;">${e.status.label}</span></div></div><button class="close-btn" onclick="closeModal()">✕</button></div><div class="modal-body"><div><p class="sec-label">Overview</p><p class="sec-text">${e.desc}</p></div><div class="two-col"><div><p class="sec-label">Purpose</p><p class="sec-text">${e.purpose}</p></div><div><p class="sec-label">Working Principle</p><p class="sec-text">${e.working}</p></div></div><div><p class="sec-label">Applications</p><p class="sec-text">${e.apps}</p></div><div><p class="sec-label">Specifications</p><div class="spec-box mono">${e.spec}</div></div><div class="two-col"><div><p class="sec-label">Inspection Checklist</p>${ul(e.check)}</div><div><p class="sec-label">Preventive Maintenance</p>${ul(e.maint)}</div></div><div><p class="sec-label">Safety Tips</p>${ul(e.safe)}</div></div><div class="modal-foot"><a class="btn btn-yt" style="flex:1" href="${e.yt}" target="_blank" rel="noopener">▶ Watch Training Video</a></div>`;
  document.getElementById("overlay").classList.add("open");document.body.style.overflow="hidden";
}
function closeModal(){document.getElementById("overlay").classList.remove("open");document.body.style.overflow="";}
document.getElementById("overlay").addEventListener("click",ev=>{if(ev.target.id==="overlay")closeModal();});

/* Search */
document.getElementById("searchInput").addEventListener("input",ev=>{
  currentSearch=ev.target.value;
  if(currentView!=="equipment"){switchView("equipment");currentSearch=ev.target.value;renderEquipment();}
  else renderEquipment();
});

/* Theme */
const themeBtn=document.getElementById("themeBtn");
function setTheme(m){document.documentElement.setAttribute("data-theme",m);themeBtn.textContent=m==="dark"?"🌙":"☀️";if(currentView==="dashboard")setTimeout(()=>renderDashboard(),50);}
themeBtn.addEventListener("click",()=>{setTheme(document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark");});
setTheme(window.matchMedia&&window.matchMedia("(prefers-color-scheme:light)").matches?"light":"dark");

/* Mobile sidebar */
function closeSidebar(){document.getElementById("sidebar").classList.remove("open");document.getElementById("sidebarBackdrop").classList.remove("show");}
document.getElementById("menuToggle").addEventListener("click",()=>{document.getElementById("sidebar").classList.toggle("open");document.getElementById("sidebarBackdrop").classList.toggle("show");});
document.getElementById("sidebarBackdrop").addEventListener("click",closeSidebar);

/* Scroll to top */
const toTop=document.getElementById("toTop");
document.getElementById("content").addEventListener("scroll",()=>{toTop.classList.toggle("show",document.getElementById("content").scrollTop>300);});
toTop.addEventListener("click",()=>{document.getElementById("content").scrollTo({top:0,behavior:"smooth"});});

/* Init */
initSidebar();renderDashboard();
</script>
</body>
</html>
