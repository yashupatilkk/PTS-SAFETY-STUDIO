<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEP &amp; Safety Vault — Equipment Reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --amber:#ffb020; --amber-dark:#e0961a; --red:#e8483a; --green:#3ecf8e;
  --radius:14px; --radius-sm:8px;
  --stripe: repeating-linear-gradient(45deg,#151515 0 14px,var(--amber) 14px 28px);
}
html[data-theme="dark"]{
  --bg:#12151a; --surface:#1a1e25; --surface-2:#20252d; --text:#e8eaed; --muted:#8b93a3; --border:#2a2f38;
  --shadow: 0 10px 30px rgba(0,0,0,.45);
}
html[data-theme="light"]{
  --bg:#f0f1ec; --surface:#ffffff; --surface-2:#f7f7f4; --text:#1b1e24; --muted:#5c6370; --border:#dfe1db;
  --shadow: 0 10px 30px rgba(20,20,10,.08);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg); color:var(--text); font-family:'Inter',sans-serif;
  transition:background .3s ease,color .3s ease; min-height:100vh;
}
h1,h2,h3,.disp{font-family:'Oswald',sans-serif; letter-spacing:.02em;}
.mono{font-family:'JetBrains Mono',monospace;}
a{color:inherit;}
button{font-family:inherit; cursor:pointer;}
::selection{background:var(--amber); color:#151515;}
 
.stripe-bar{height:5px; background:var(--stripe); background-size:40px 40px;}
 
.topbar{
  position:sticky; top:0; z-index:40; background:var(--surface);
  border-bottom:1px solid var(--border); backdrop-filter:blur(8px);
}
.topbar-inner{
  max-width:1400px; margin:0 auto; padding:16px 24px; display:flex; align-items:center;
  gap:20px; flex-wrap:wrap; justify-content:space-between;
}
.brand{display:flex; align-items:center; gap:14px;}
.brand-mark{
  width:46px; height:46px; border-radius:10px; display:flex; align-items:center; justify-content:center;
  background:var(--stripe); background-size:26px 26px; font-size:20px; flex:none;
  box-shadow:var(--shadow);
}
.brand h1{font-size:22px; margin:0; text-transform:uppercase; font-weight:700;}
.brand p{margin:2px 0 0; font-size:12.5px; color:var(--muted);}
 
.controls{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
.search-wrap{position:relative;}
.search-wrap input{
  width:260px; max-width:60vw; padding:10px 14px 10px 36px; border-radius:999px; border:1px solid var(--border);
  background:var(--surface-2); color:var(--text); font-size:14px; outline:none; transition:border .2s;
}
.search-wrap input:focus{border-color:var(--amber);}
.search-wrap .ic{position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:14px;}
select#catSelect{
  padding:10px 14px; border-radius:999px; border:1px solid var(--border); background:var(--surface-2);
  color:var(--text); font-size:13.5px; outline:none;
}
.theme-btn{
  width:40px; height:40px; border-radius:50%; border:1px solid var(--border); background:var(--surface-2);
  color:var(--text); font-size:17px; display:flex; align-items:center; justify-content:center;
  transition:transform .25s ease, background .2s;
}
.theme-btn:hover{transform:rotate(20deg); background:var(--amber); color:#151515; border-color:var(--amber);}
 
.chips-wrap{
  max-width:1400px; margin:0 auto; padding:14px 24px 0; display:flex; gap:8px; overflow-x:auto;
  scrollbar-width:thin;
}
.chip{
  flex:none; padding:8px 16px; border-radius:999px; border:1px solid var(--border); background:var(--surface);
  color:var(--muted); font-size:12.5px; font-weight:600; text-transform:uppercase; letter-spacing:.03em;
  white-space:nowrap; transition:all .2s;
}
.chip:hover{border-color:var(--amber); color:var(--text);}
.chip.active{background:var(--amber); color:#151515; border-color:var(--amber);}
 
main{max-width:1400px; margin:0 auto; padding:22px 24px 60px;}
.stats{color:var(--muted); font-size:13px; margin-bottom:16px;}
.stats b{color:var(--text);}
 
.grid{
  display:grid; grid-template-columns:repeat(auto-fill,minmax(272px,1fr)); gap:18px;
}
.card{
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden;
  display:flex; flex-direction:column; opacity:0; transform:translateY(16px);
  animation:rise .5s ease forwards;
  transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
}
.card:hover{transform:translateY(-6px); box-shadow:var(--shadow); border-color:var(--amber);}
@keyframes rise{to{opacity:1; transform:translateY(0);}}
 
.thumb{
  height:130px; position:relative; display:flex; align-items:center; justify-content:center;
  font-size:44px; color:#fff;
}
.thumb::after{
  content:""; position:absolute; inset:0; background:linear-gradient(180deg,rgba(0,0,0,0) 40%,rgba(0,0,0,.35) 100%);
}
.thumb .tag{
  position:absolute; top:10px; left:10px; z-index:2; font-size:10px; font-weight:700; text-transform:uppercase;
  letter-spacing:.04em; background:rgba(0,0,0,.5); color:#fff; padding:4px 9px; border-radius:999px;
  backdrop-filter:blur(3px);
}
.thumb .ico{position:relative; z-index:1;}
 
.card-body{padding:16px 16px 14px; display:flex; flex-direction:column; gap:8px; flex:1;}
.card-body h3{margin:0; font-size:17px; text-transform:uppercase; font-weight:600;}
.cat-line{display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.03em; font-weight:600;}
.cat-dot{width:7px; height:7px; border-radius:50%; background:var(--amber); flex:none;}
.desc{
  font-size:13px; color:var(--muted); line-height:1.5; margin:0;
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
}
.spec-line{font-size:11.5px; color:var(--text); background:var(--surface-2); border:1px solid var(--border); border-radius:6px; padding:6px 9px; line-height:1.4;}
 
.card-actions{display:flex; gap:8px; margin-top:auto; padding-top:6px;}
.btn{
  flex:1; padding:10px 10px; border-radius:999px; border:1px solid var(--border); background:transparent;
  color:var(--text); font-size:12.5px; font-weight:700; text-transform:uppercase; letter-spacing:.02em;
  display:flex; align-items:center; justify-content:center; gap:6px; transition:all .2s; text-decoration:none;
}
.btn-primary{background:var(--amber); border-color:var(--amber); color:#151515;}
.btn-primary:hover{background:var(--amber-dark);}
.btn-yt{border-color:var(--red); color:var(--red);}
.btn-yt:hover{background:var(--red); color:#fff;}
 
/* modal */
.overlay{
  position:fixed; inset:0; background:rgba(5,6,8,.7); backdrop-filter:blur(4px); z-index:100;
  display:flex; align-items:flex-start; justify-content:center; padding:40px 16px;
  opacity:0; pointer-events:none; transition:opacity .25s ease;
  overflow-y:auto;
}
.overlay.open{opacity:1; pointer-events:auto;}
.modal{
  background:var(--surface); border:1px solid var(--border); border-radius:16px; width:100%; max-width:720px;
  transform:translateY(30px) scale(.97); transition:transform .3s ease; box-shadow:var(--shadow); margin:auto 0;
}
.overlay.open .modal{transform:translateY(0) scale(1);}
.modal-top{height:6px; background:var(--stripe); background-size:30px 30px; border-radius:16px 16px 0 0;}
.modal-head{padding:22px 24px 14px; display:flex; gap:16px; align-items:flex-start; border-bottom:1px solid var(--border);}
.modal-ico{
  width:58px; height:58px; border-radius:12px; flex:none; display:flex; align-items:center; justify-content:center;
  font-size:28px; color:#fff;
}
.modal-head h2{margin:0 0 4px; font-size:22px; text-transform:uppercase;}
.modal-head .cat-line{margin:0;}
.close-btn{
  margin-left:auto; width:34px; height:34px; border-radius:50%; border:1px solid var(--border); background:var(--surface-2);
  color:var(--text); font-size:16px; flex:none; display:flex; align-items:center; justify-content:center;
}
.close-btn:hover{background:var(--red); color:#fff; border-color:var(--red);}
.modal-body{padding:6px 24px 24px; display:flex; flex-direction:column; gap:18px;}
.sec-label{
  font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--amber); margin:0 0 6px;
}
.sec-text{font-size:14px; line-height:1.6; color:var(--text); margin:0;}
.spec-box{font-size:13px; background:var(--surface-2); border:1px solid var(--border); border-radius:8px; padding:10px 12px; line-height:1.6;}
.ul-list{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:7px;}
.ul-list li{font-size:13.5px; line-height:1.5; display:flex; gap:8px; align-items:flex-start;}
.ul-list li::before{content:"✓"; color:var(--green); font-weight:700; flex:none; margin-top:1px;}
.two-col{display:grid; grid-template-columns:1fr 1fr; gap:18px;}
.modal-foot{padding:6px 24px 24px; display:flex; gap:10px;}
.modal-foot .btn{flex:none; padding:12px 22px;}
 
.to-top{
  position:fixed; right:22px; bottom:22px; width:46px; height:46px; border-radius:50%; border:none;
  background:var(--amber); color:#151515; font-size:18px; font-weight:700; box-shadow:var(--shadow);
  opacity:0; pointer-events:none; transform:translateY(10px); transition:all .25s ease; z-index:50;
}
.to-top.show{opacity:1; pointer-events:auto; transform:translateY(0);}
.to-top:hover{background:var(--amber-dark);}
 
footer{text-align:center; padding:26px 16px 40px; color:var(--muted); font-size:12.5px; border-top:1px solid var(--border);}
.empty{grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--muted);}
.empty .e-ico{font-size:38px; display:block; margin-bottom:10px;}
 
@media(max-width:640px){
  .topbar-inner{flex-direction:column; align-items:stretch;}
  .controls{justify-content:space-between;}
  .search-wrap input{width:100%; max-width:none;}
  .two-col{grid-template-columns:1fr;}
  .modal-head{flex-wrap:wrap;}
}
</style>
</head>
<body>
 
<header class="topbar">
  <div class="stripe-bar"></div>
  <div class="topbar-inner">
    <div class="brand">
      <div class="brand-mark">⚠️</div>
      <div>
        <h1>MEP &amp; Safety Vault</h1>
        <p>Field reference for fire, electrical &amp; mechanical safety equipment</p>
      </div>
    </div>
    <div class="controls">
      <div class="search-wrap">
        <span class="ic">🔎</span>
        <input type="text" id="searchInput" placeholder="Search equipment...">
      </div>
      <select id="catSelect"></select>
      <button class="theme-btn" id="themeBtn" title="Toggle theme">🌙</button>
    </div>
  </div>
  <div class="chips-wrap" id="chips"></div>
</header>
 
<main>
  <div class="stats" id="statsLine"></div>
  <div class="grid" id="grid"></div>
</main>
 
<footer>MEP &amp; Safety Vault — Reference tool for field inspection, training &amp; maintenance planning. Always follow site-specific SOPs and statutory requirements.</footer>
 
<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>
 
<button class="to-top" id="toTop" title="Back to top">↑</button>

/* ---------- Build full equipment objects ---------- */
const EQUIP = DATA.map((d,idx)=>{
  const t = CATS[d.c];
  return {
    id: idx,
    name: d.n,
    cat: d.c,
    icon: d.i,
    spec: d.s,
    color: t.color,
    desc: t.desc.replaceAll("{n}", d.n),
    purpose: t.purpose,
    working: t.working,
    apps: t.apps,
    check: t.check,
    maint: t.maint,
    safe: t.safe,
    yt: "https://www.youtube.com/results?search_query=" + encodeURIComponent(d.n + " training maintenance safety")
  };
});
 
/* ---------- State ---------- */
let currentCat = "All";
let currentSearch = "";
 
/* ---------- Render category chips + select ---------- */
function initFilters(){
  const cats = ["All", ...Object.keys(CATS)];
  const chipsWrap = document.getElementById("chips");
  const select = document.getElementById("catSelect");
  cats.forEach(c=>{
    const count = c==="All" ? EQUIP.length : EQUIP.filter(e=>e.cat===c).length;
    const chip = document.createElement("button");
    chip.className = "chip" + (c==="All" ? " active" : "");
    chip.textContent = c + " (" + count + ")";
    chip.dataset.cat = c;
    chip.addEventListener("click", ()=>{
      currentCat = c;
      document.querySelectorAll(".chip").forEach(el=>el.classList.remove("active"));
      chip.classList.add("active");
      select.value = c;
      render();
    });
    chipsWrap.appendChild(chip);
 
    const opt = document.createElement("option");
    opt.value = c; opt.textContent = c + " (" + count + ")";
    select.appendChild(opt);
  });
  select.addEventListener("change", ()=>{
    currentCat = select.value;
    document.querySelectorAll(".chip").forEach(el=>{
      el.classList.toggle("active", el.dataset.cat === currentCat);
    });
    render();
  });
}
 
/* ---------- Card markup ---------- */
function cardHTML(e, i){
  return `
  <div class="card" style="animation-delay:${Math.min(i*25,400)}ms" data-id="${e.id}">
    <div class="thumb" style="background:linear-gradient(135deg, ${e.color}, #151515)">
      <span class="tag">${e.cat}</span>
      <span class="ico">${e.icon}</span>
    </div>
    <div class="card-body">
      <h3>${e.name}</h3>
      <div class="cat-line"><span class="cat-dot" style="background:${e.color}"></span>${e.cat}</div>
      <p class="desc">${e.desc}</p>
      <div class="spec-line mono">${e.spec}</div>
      <div class="card-actions">
        <button class="btn btn-primary" onclick="openModal(${e.id})">ℹ️ More Info</button>
        <a class="btn btn-yt" href="${e.yt}" target="_blank" rel="noopener">▶ YouTube</a>
      </div>
    </div>
  </div>`;
}
 
/* ---------- Render grid ---------- */
function render(){
  const grid = document.getElementById("grid");
  const q = currentSearch.trim().toLowerCase();
  const filtered = EQUIP.filter(e=>{
    const matchCat = currentCat==="All" || e.cat===currentCat;
    const matchSearch = !q || e.name.toLowerCase().includes(q) || e.cat.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });
  document.getElementById("statsLine").innerHTML =
    `Showing <b>${filtered.length}</b> of <b>${EQUIP.length}</b> equipment assets`;
 
  if(filtered.length===0){
    grid.innerHTML = `<div class="empty"><span class="e-ico">🗂️</span>No equipment matches your search. Try a different keyword or category.</div>`;
    return;
  }
  grid.innerHTML = filtered.map((e,i)=>cardHTML(e,i)).join("");
}
 
/* ---------- Modal ---------- */
function ul(items){
  return `<ul class="ul-list">${items.map(x=>`<li>${x}</li>`).join("")}</ul>`;
}
function openModal(id){
  const e = EQUIP.find(x=>x.id===id);
  if(!e) return;
  const modal = document.getElementById("modal");
  modal.innerHTML = `
    <div class="modal-top"></div>
    <div class="modal-head">
      <div class="modal-ico" style="background:linear-gradient(135deg, ${e.color}, #151515)">${e.icon}</div>
      <div>
        <h2>${e.name}</h2>
        <div class="cat-line"><span class="cat-dot" style="background:${e.color}"></span>${e.cat}</div>
      </div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div>
        <p class="sec-label">Overview</p>
        <p class="sec-text">${e.desc}</p>
      </div>
      <div class="two-col">
        <div>
          <p class="sec-label">Purpose</p>
          <p class="sec-text">${e.purpose}</p>
        </div>
        <div>
          <p class="sec-label">Working Principle</p>
          <p class="sec-text">${e.working}</p>
        </div>
      </div>
      <div>
        <p class="sec-label">Applications</p>
        <p class="sec-text">${e.apps}</p>
      </div>
      <div>
        <p class="sec-label">Specifications</p>
        <div class="spec-box mono">${e.spec}</div>
      </div>
      <div class="two-col">
        <div>
          <p class="sec-label">Inspection Checklist</p>
          ${ul(e.check)}
        </div>
        <div>
          <p class="sec-label">Preventive Maintenance</p>
          ${ul(e.maint)}
        </div>
      </div>
      <div>
        <p class="sec-label">Safety Tips</p>
        ${ul(e.safe)}
      </div>
    </div>
    <div class="modal-foot">
      <a class="btn btn-yt" style="flex:1" href="${e.yt}" target="_blank" rel="noopener">▶ Watch YouTube Training</a>
    </div>
  `;
  document.getElementById("overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}
function closeModal(){
  document.getElementById("overlay").classList.remove("open");
  document.body.style.overflow = "";
}
document.getElementById("overlay").addEventListener("click", (ev)=>{
  if(ev.target.id === "overlay") closeModal();
});
document.addEventListener("keydown", (ev)=>{
  if(ev.key === "Escape") closeModal();
});
 
/* ---------- Search ---------- */
document.getElementById("searchInput").addEventListener("input", (ev)=>{
  currentSearch = ev.target.value;
  render();
});
 
/* ---------- Theme toggle ---------- */
const themeBtn = document.getElementById("themeBtn");
function setTheme(mode){
  document.documentElement.setAttribute("data-theme", mode);
  themeBtn.textContent = mode === "dark" ? "🌙" : "☀️";
}
themeBtn.addEventListener("click", ()=>{
  const cur = document.documentElement.getAttribute("data-theme");
  setTheme(cur === "dark" ? "light" : "dark");
});
const prefersLight = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches;
setTheme(prefersLight ? "light" : "dark");
 
/* ---------- Scroll to top ---------- */
const toTop = document.getElementById("toTop");
window.addEventListener("scroll", ()=>{
  toTop.classList.toggle("show", window.scrollY > 420);
});
toTop.addEventListener("click", ()=>{
  window.scrollTo({top:0, behavior:"smooth"});
});
 
/* ---------- Init ---------- */
initFilters();
render();
</script>
